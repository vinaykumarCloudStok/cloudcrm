services:
  - type: web
    name: agentcrm
    runtime: node
    buildCommand: npm install && cd server && npm install && cd ../client && npm install && cd ../client && npm run build && cd ../server && npx prisma generate && npx prisma migrate deploy
    startCommand: cd server && NODE_ENV=production npx tsx src/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://agentcrm.onrender.com
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: agentcrm-data
      mountPath: /opt/render/project/src/server/prisma
      sizeGB: 1
